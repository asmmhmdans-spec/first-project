<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="Form.css">
</head>

<body>
    <!-- FORM -->
     
    <div class="container">
        <div class="logo">
            <i class="fa-solid fa-leaf"><svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="lucide lucide-leaf-icon lucide-leaf">
                    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" />
                    <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" />
                </svg></i>
        </div>
        <h2>مرحباً بك مجدداً</h2>
        <p>سجل دخول لمتابعة رحلتك</p>

        <form id="form">

            <div class="input-group">
                <label>الاسم</label>
                <input type="text" id="name" placeholder="اكتب اسمك" >
                <div id="nameError" class="error"></div>
            </div>

            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@email.com" >
                <div id="emailError" class="error"></div>
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••" >
                <div id="passwordError" class="error"></div>
            </div>

            <button type="submit">تسجيل الدخول →</button>
        </form>
    </div>
    <script src="api.js"></script>
    <script src="form.js"></script>
</body>

</html>
